    <!-- CONTENIDO PRINCIPAL - FORMULARIO DE LOGIN -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="bg-dark-blue p-4 p-md-5 rounded-4 border border-gold">
                    <!-- Logo pequeño -->
                    <a href="../index.html" class="d-block text-center mb-4">
                        <img src="../img/logo.webp" alt="Monkey House" height="70" class="logo-gold">
                    </a>
                    
                    <h1 class="text-gold text-center h2 mb-4">Bienvenido de vuelta</h1>
                    <p class="text-white-50 text-center mb-5">Ingresá a tu cuenta para continuar</p>
                    
                    <form>
                        <!-- Email -->
                        <div class="mb-4">
                            <label for="email" class="form-label">
                                <i class="me-2">📧</i> Email
                            </label>
                            <input type="email" class="form-control" id="email" 
                                   placeholder="tucorreo@ejemplo.com" required>
                        </div>
                        
                        <!-- Contraseña -->
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="me-2">🔒</i> Contraseña
                            </label>
                            <input type="password" class="form-control" id="password" 
                                   placeholder="••••••••" required>
                        </div>
                        
                        <!-- Recordar y olvidé contraseña -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">
                                    Recordarme
                                </label>
                            </div>
                            <a href="#" class="text-gold text-decoration-none hover-gold">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>
                        
                        <!-- Botón de envío -->
                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4 fs-5">
                            <span class="me-2">→</span> Iniciar Sesión
                        </button>
                        
                        <!-- Link a registro -->
                        <p class="text-center text-white-50 mb-0">
                            ¿No tenés cuenta? 
                            <a href="#" class="text-gold text-decoration-none hover-gold fw-bold">
                                Registrate aquí
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>
